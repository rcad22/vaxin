<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VAX-IN | Offline Field Mode</title>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.jsdelivr.net/npm/signature_pad@4.1.7/dist/signature_pad.umd.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background-color: #f4f7f6;
            margin: 0;
        }

        .offline-header {
            background-color: #e63946;
            color: white;
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .container {
            max-width: 900px;
            margin: 30px auto;
            padding: 0 20px;
        }

        .card {
            background: white;
            border-radius: 12px;
            padding: 25px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
            margin-bottom: 20px;
        }

        .form-control {
            width: 100%;
            padding: 10px;
            border: 2px solid #e9ecef;
            border-radius: 8px;
            margin-bottom: 15px;
            font-family: 'Poppins', sans-serif;
            box-sizing: border-box;
        }

        .btn-main {
            background-color: #1b4332;
            color: white;
            border: none;
            padding: 15px 20px;
            border-radius: 8px;
            font-weight: bold;
            width: 100%;
            cursor: pointer;
            transition: 0.3s;
            font-size: 1.1rem;
        }

        .btn-main:hover {
            background-color: #2d6a4f;
        }

        .btn-sync {
            background-color: #f6c23e;
            color: #333;
            border: none;
            padding: 12px 20px;
            border-radius: 8px;
            font-weight: bold;
            width: 100%;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }

        .queue-box {
            background-color: #fff3cd;
            border-left: 5px solid #f6c23e;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
        }

        .section-title {
            color: #2d6a4f;
            border-bottom: 2px solid #ccc;
            padding-bottom: 5px;
            margin-bottom: 15px;
            margin-top: 20px;
        }

        .row {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }

        .col {
            flex: 1;
            min-width: 200px;
        }

        .checkbox-group {
            display: flex;
            gap: 20px;
            margin-bottom: 15px;
        }

        .radio-group {
            background: #f8f9fa;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #e9ecef;
            margin-bottom: 15px;
        }

        .reg-type-box {
            background: #e9f5e9;
            border: 2px solid #2d6a4f;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
        }

        /* Signature Pad CSS */
        .signature-wrapper {
            position: relative;
            width: 100%;
            height: 200px;
            background-color: #fff;
            border: 2px dashed #adb5bd;
            border-radius: 8px;
            margin-bottom: 5px;
        }

        .signature-pad {
            position: absolute;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            cursor: crosshair;
        }
    </style>
</head>

<body>

    <div class="offline-header">
        <h4 style="margin: 0;"><i class="fas fa-wifi-slash mr-2"></i> VAX-IN Field Mode (Offline)</h4>
        <div id="userInfo" style="font-size: 0.9rem; font-weight: bold;">Loading User...</div>
    </div>

    <div class="container">

        <div class="queue-box d-flex justify-content-between align-items-center" style="display: flex;">
            <div style="flex-grow: 1;">
                <h5 style="margin: 0; color: #856404;"><i class="fas fa-database"></i> Pending Sync Queue</h5>
                <p style="margin: 0; font-size: 0.85rem; color: #666;">Records waiting for internet: <strong
                        id="queueCount" style="font-size: 1.2rem; color: #e63946;">0</strong></p>
            </div>
            <button id="syncBtn" class="btn-sync" style="width: auto;">
                <i class="fas fa-cloud-upload-alt"></i> Sync to Cloud Now
            </button>
        </div>

        <div class="card">
            <p style="font-size: 0.85rem; color: #666; text-align: center;">Fill out this official form. Data will be
                saved to your device memory.</p>

            <form id="offlineForm">

                <div class="reg-type-box shadow-sm">
                    <label class="font-weight-bold d-block text-dark mb-2" style="font-size:1.1rem;"><i
                            class="fas fa-list-ul mr-2"></i>Registration Type (Select First) *</label>
                    <div style="display:flex; gap: 20px;">
                        <div>
                            <input type="radio" id="typeOwned" name="registration_type" value="Owned" checked>
                            <label class="font-weight-bold text-success" for="typeOwned">Owned Pet</label>
                        </div>
                        <div>
                            <input type="radio" id="typeStray" name="registration_type" value="Stray">
                            <label class="font-weight-bold text-danger" for="typeStray">Stray Animal (Ligaw)</label>
                        </div>
                    </div>
                </div>

                <label class="small font-weight-bold">Barangay Residence / Location *</label>
                <select id="barangay_id" class="form-control" required>
                    <option value="">Select Barangay...</option>
                    <option value="1">Anapog-Sibucao</option>
                    <option value="2">Argao</option>
                    <option value="3">Balanacan</option>
                    <option value="4">Banto</option>
                    <option value="5">Bintakay</option>
                    <option value="6">Bocboc</option>
                    <option value="7">Butansapa</option>
                    <option value="8">Candahon</option>
                    <option value="9">Capayang</option>
                    <option value="10">Danao</option>
                    <option value="11">Dulong Bayan (Pob.)</option>
                    <option value="12">Gitnang Bayan (Pob.)</option>
                    <option value="13">Guisian</option>
                    <option value="14">Hinadharan</option>
                    <option value="15">Hinanggayon</option>
                    <option value="16">Ino</option>
                    <option value="17">Janagdong</option>
                    <option value="18">Lamesa</option>
                    <option value="19">Laon</option>
                    <option value="20">Magapua</option>
                    <option value="21">Malayak</option>
                    <option value="22">Malusak</option>
                    <option value="23">Mampaitan</option>
                    <option value="24">Mangyan-Mababad</option>
                    <option value="25">Market Site (Pob.)</option>
                    <option value="26">Mataas Na Bayan (Pob.)</option>
                    <option value="27">Mendez</option>
                    <option value="28">Nangka I</option>
                    <option value="29">Nangka II</option>
                    <option value="30">Paye</option>
                    <option value="31">Pili</option>
                    <option value="32">Puting Buhangin</option>
                    <option value="33">Sayao</option>
                    <option value="34">Silangan</option>
                    <option value="35">Sumangga</option>
                    <option value="36">Tarug</option>
                    <option value="37">Villa Mendez (Pob.)</option>
                </select>

                <div id="ownerInfoSection">
                    <h5 class="section-title"><i class="fas fa-user mr-2"></i> 1. Owner's Information</h5>
                    <div class="row">
                        <div class="col">
                            <label class="small font-weight-bold">Owner's Full Name *</label>
                            <input type="text" id="owner_name" class="form-control owner-field" required>
                        </div>
                        <div class="col">
                            <label class="small font-weight-bold">Contact Number *</label>
                            <input type="text" id="contact_no" class="form-control owner-field" maxlength="11"
                                placeholder="09XXXXXXXXX" oninput="this.value = this.value.replace(/[^0-9]/g, '')"
                                required>
                        </div>
                    </div>

                    <div class="row">
                        <div class="col">
                            <label class="small font-weight-bold">Gender *</label>
                            <select id="owner_gender" class="form-control owner-field" required>
                                <option value="">Select...</option>
                                <option value="Male">Male</option>
                                <option value="Female">Female</option>
                            </select>
                        </div>
                        <div class="col">
                            <label class="small font-weight-bold">Birthday</label>
                            <input type="date" id="owner_birthday" class="form-control owner-field">
                        </div>
                    </div>

                    <div class="checkbox-group">
                        <label><input type="checkbox" id="is_pwd" class="owner-field" value="1"> PWD</label>
                        <label><input type="checkbox" id="is_senior" class="owner-field" value="1"> Senior
                            Citizen</label>
                    </div>

                    <div class="form-group mt-3">
                        <label class="small font-weight-bold"><i class="fas fa-pen-nib mr-1"></i> Owner's Digital
                            Signature
                            *</label>
                        <div class="signature-wrapper">
                            <canvas id="signature-pad" class="signature-pad"></canvas>
                        </div>
                        <div style="display:flex; justify-content:space-between; margin-bottom: 15px;">
                            <small style="color:#666; font-style:italic;">Please sign inside the box.</small>
                            <button type="button" id="clear-signature"
                                style="padding:4px 12px; background:#e63946; color:#fff; border:none; border-radius:4px; cursor:pointer;">Clear
                                Signature</button>
                        </div>
                    </div>
                </div>

                <h5 class="section-title"><i class="fas fa-paw mr-2"></i> 2. Animal's Information</h5>
                <div class="row">
                    <div class="col">
                        <label class="small font-weight-bold">Pet / Tag Name *</label>
                        <input type="text" id="animal_name" class="form-control" placeholder="e.g. Bantay (Or 'Tag-01')"
                            required>
                    </div>
                    <div class="col">
                        <label class="small font-weight-bold">Animal Type *</label>
                        <select id="species_id" class="form-control" required>
                            <option value="">Select...</option>
                            <option value="7">Dog</option>
                            <option value="2">Cat</option>
                        </select>
                    </div>
                </div>

                <div class="row">
                    <div class="col">
                        <label class="small font-weight-bold">Birth Date / Est. Date *</label>
                        <input type="date" id="birth_date" class="form-control" required>
                    </div>
                    <div class="col">
                        <label class="small font-weight-bold">Sex *</label>
                        <select id="sex" class="form-control" required>
                            <option value="M">Male (M)</option>
                            <option value="F">Female (F)</option>
                        </select>
                    </div>
                </div>

                <div class="row">
                    <div class="col">
                        <label class="small font-weight-bold">Breed *</label>
                        <input type="text" id="breed" class="form-control" required>
                    </div>
                    <div class="col">
                        <label class="small font-weight-bold">Color / Markings *</label>
                        <input type="text" id="color" class="form-control" required>
                    </div>
                </div>

                <div class="row radio-group">
                    <div class="col">
                        <label style="font-weight:bold; display:block;">Fixed Status</label>
                        <label><input type="radio" name="is_fixed" value="1"> Kapon / Ligate</label><br>
                        <label><input type="radio" name="is_fixed" value="0" checked> Hindi Kapon</label>
                    </div>
                </div>

                <h5 class="section-title"><i class="fas fa-syringe mr-2"></i> 3. Vaccination Details</h5>

                <div class="radio-group" style="background:#fff; border-color:#2d6a4f;">
                    <label class="font-weight-bold d-block text-dark mb-2 border-bottom pb-2">Vaccination Status
                        *</label>
                    <div style="display:flex; gap: 20px;">
                        <div>
                            <input type="radio" id="statVax" name="status" value="Vaccinated" checked>
                            <label class="text-success font-weight-bold" for="statVax">Successfully Vaccinated</label>
                        </div>
                        <div>
                            <input type="radio" id="statNotVax" name="status" value="Not Vaccinated">
                            <label class="text-danger font-weight-bold" for="statNotVax">Not Vaccinated (Failed
                                Attempt)</label>
                        </div>
                    </div>
                </div>

                <div id="vaxTypeSection">
                    <label class="small font-weight-bold">Vaccine Administered *</label>
                    <select id="vaccine_id" class="form-control" required>
                        <option value="">Select Vaccine...</option>
                        <option value="1">Anti-Rabies</option>
                    </select>
                </div>

                <div class="row mt-3">
                    <div class="col">
                        <label class="small font-weight-bold">Assisting Barangay Official</label>
                        <input type="text" id="official_name" class="form-control" placeholder="e.g. Juan Cruz">
                    </div>
                    <div class="col">
                        <label class="small font-weight-bold">Official's Designation</label>
                        <input type="text" id="official_designation" class="form-control" placeholder="e.g. Kagawad">
                    </div>
                </div>

                <label class="small font-weight-bold mt-2" id="remarksLabel">Remarks / Batch Number</label>
                <input type="text" id="remarks" class="form-control" placeholder="Any additional notes...">

                <button type="submit" class="btn-main"><i class="fas fa-save"></i> Save Offline Record</button>
            </form>
        </div>

        <div style="text-align: center; margin-top: 20px; padding-bottom: 50px;">
            <a href="index" style="color: #666; text-decoration: none; font-size: 0.9rem;"><i
                    class="fas fa-arrow-left"></i> Back to Login Page</a>
        </div>

    </div>

    <script>
        // INIT USER
        const savedUserData = localStorage.getItem("vaxin_offline_user");
        let vaccinator_id = 0;

        if (savedUserData) {
            const user = JSON.parse(savedUserData);
            document.getElementById('userInfo').innerText = user.fullname + " (" + user.role + ")";
            vaccinator_id = user.userid;
        } else {
            alert("No user session found. Please login while online first.");
            window.location.href = "login.php";
        }

        // INIT QUEUE
        let syncQueue = JSON.parse(localStorage.getItem('vaxin_sync_queue')) || [];
        updateQueueCount();

        // INIT SIGNATURE PAD
        var canvas = document.getElementById('signature-pad');
        function resizeCanvas() {
            var ratio = Math.max(window.devicePixelRatio || 1, 1);
            canvas.width = canvas.offsetWidth * ratio;
            canvas.height = canvas.offsetHeight * ratio;
            canvas.getContext("2d").scale(ratio, ratio);
        }
        window.addEventListener("resize", resizeCanvas);
        resizeCanvas();

        var signaturePad = new SignaturePad(canvas, {
            backgroundColor: 'rgba(255, 255, 255, 1)',
            penColor: 'rgb(0, 0, 0)'
        });

        document.getElementById('clear-signature').addEventListener('click', function () {
            signaturePad.clear();
        });

        // SPRINT 4: REGISTRATION TYPE TOGGLE (OWNED vs STRAY)
        const typeOwned = document.getElementById('typeOwned');
        const typeStray = document.getElementById('typeStray');
        const ownerInfoSection = document.getElementById('ownerInfoSection');
        const ownerFields = document.querySelectorAll('.owner-field');

        function toggleOwnerFields() {
            if (typeStray.checked) {
                ownerInfoSection.style.display = 'none';
                ownerFields.forEach(field => field.required = false);
            } else {
                ownerInfoSection.style.display = 'block';
                document.getElementById('owner_name').required = true;
                document.getElementById('contact_no').required = true;
                document.getElementById('owner_gender').required = true;
                resizeCanvas(); // Ensure signature pad size is correct when unhidden
            }
        }
        typeOwned.addEventListener('change', toggleOwnerFields);
        typeStray.addEventListener('change', toggleOwnerFields);


        // SPRINT 4: VACCINATION STATUS TOGGLE (VACCINATED vs NOT)
        const statVax = document.getElementById('statVax');
        const statNotVax = document.getElementById('statNotVax');
        const vaxTypeSection = document.getElementById('vaxTypeSection');
        const vaccineIdInput = document.getElementById('vaccine_id');
        const remarksLabel = document.getElementById('remarksLabel');
        const remarksInput = document.getElementById('remarks');

        function toggleVaccinationStatus() {
            if (statNotVax.checked) {
                vaxTypeSection.style.display = 'none';
                vaccineIdInput.required = false;
                vaccineIdInput.value = '';

                remarksLabel.innerHTML = '<span style="color:#e63946;">Reason for NOT Vaccinating *</span>';
                remarksInput.required = true;
                remarksInput.placeholder = 'e.g. Biting, Pregnant, Owner Refused, Sick...';
            } else {
                vaxTypeSection.style.display = 'block';
                vaccineIdInput.required = true;

                remarksLabel.innerHTML = 'Remarks / Batch Number';
                remarksInput.required = false;
                remarksInput.placeholder = 'Notes about the animal\'s reaction...';
            }
        }
        statVax.addEventListener('change', toggleVaccinationStatus);
        statNotVax.addEventListener('change', toggleVaccinationStatus);


        // HANDLE FORM SUBMISSION
        document.getElementById('offlineForm').addEventListener('submit', function (e) {
            e.preventDefault();

            // Validate Signature IF it's an Owned Pet
            let signatureData = "";
            if (typeOwned.checked) {
                if (signaturePad.isEmpty()) {
                    Swal.fire({ icon: 'warning', title: 'Signature Required', text: 'Please ask the owner to sign.' });
                    return;
                }
                signatureData = signaturePad.toDataURL('image/png');
            }

            let isStrayVal = typeStray.checked ? 1 : 0;
            let fixedVal = document.querySelector('input[name="is_fixed"]:checked').value;
            let vaxStatus = document.querySelector('input[name="status"]:checked').value;

            // KUMPLETUHIN ANG DATA NA ISESEND
            const record = {
                // SPRINT 4: Send Empty/N/A values for owner if it's a Stray
                owner_name: isStrayVal ? 'None (Stray Animal)' : document.getElementById('owner_name').value,
                contact_no: isStrayVal ? 'N/A' : document.getElementById('contact_no').value,
                owner_gender: isStrayVal ? '' : document.getElementById('owner_gender').value,
                owner_birthday: isStrayVal ? '' : document.getElementById('owner_birthday').value,
                is_pwd: isStrayVal ? 0 : (document.getElementById('is_pwd').checked ? 1 : 0),
                is_senior: isStrayVal ? 0 : (document.getElementById('is_senior').checked ? 1 : 0),
                owner_signature: signatureData,

                barangay_id: document.getElementById('barangay_id').value,

                animal_name: document.getElementById('animal_name').value,
                species_id: document.getElementById('species_id').value,
                birth_date: document.getElementById('birth_date').value,
                sex: document.getElementById('sex').value,
                breed: document.getElementById('breed').value,
                color: document.getElementById('color').value,
                is_stray: isStrayVal,
                is_fixed: fixedVal,

                status: vaxStatus,
                vaccine_id: document.getElementById('vaccine_id').value,
                official_name: document.getElementById('official_name').value,
                official_designation: document.getElementById('official_designation').value,
                remarks: document.getElementById('remarks').value,

                vaccinator_id: vaccinator_id,
                date_recorded: new Date().toISOString()
            };

            syncQueue.push(record);
            localStorage.setItem('vaxin_sync_queue', JSON.stringify(syncQueue));

            updateQueueCount();

            // Clear form AND signature pad
            this.reset();
            signaturePad.clear();

            // Reset to defaults after saving
            document.getElementById('typeOwned').checked = true;
            document.getElementById('statVax').checked = true;
            toggleOwnerFields();
            toggleVaccinationStatus();

            window.scrollTo(0, 0);

            Swal.fire({
                toast: true, position: 'top-end', icon: 'success',
                title: 'Saved locally!', text: 'Record added to queue.',
                showConfirmButton: false, timer: 2000
            });
        });

        function updateQueueCount() {
            document.getElementById('queueCount').innerText = syncQueue.length;
        }

        // SYNC TO CLOUD
        document.getElementById('syncBtn').addEventListener('click', function () {
            if (syncQueue.length === 0) {
                Swal.fire("Queue Empty", "There are no records to sync.", "info");
                return;
            }

            if (!navigator.onLine) {
                Swal.fire("No Internet", "Please connect to Wi-Fi or Mobile Data before syncing.", "error");
                return;
            }

            Swal.fire({
                title: 'Syncing to Database...',
                html: 'Uploading ' + syncQueue.length + ' records. Please wait.',
                allowOutsideClick: false,
                didOpen: () => { Swal.showLoading(); }
            });

            fetch('sync_offline_data.php', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(syncQueue)
            })
                .then(response => response.json())
                .then(data => {
                    if (data.status === 'success') {
                        syncQueue = [];
                        localStorage.removeItem('vaxin_sync_queue');
                        updateQueueCount();
                        Swal.fire("Sync Complete!", data.message, "success");
                    } else {
                        Swal.fire("Sync Failed", data.message, "error");
                    }
                })
                .catch(error => {
                    console.error('Error:', error);
                    Swal.fire("Network Error", "Could not reach the server. Try again later.", "error");
                });
        });
    </script>
</body>

</html>
